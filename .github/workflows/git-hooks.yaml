name: "Git Hooks"

on:
  pull_request: ~
  push:
    branches:
      - master

jobs:
  run-prek:
    name: prek run --all-files
    runs-on: ubuntu-24.04
    timeout-minutes: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run prek
        uses: j178/prek-action@v2.0.1
