# Third-party programs used by anvi'o
#
# Each entry key is the registry name used when constructing an AnvioExecutor
# (e.g., AnvioExecutor('diamond', ...)). For tool suites, the entry covers all
# binaries in that suite (e.g., 'blast' covers blastp, blastn, makeblastdb).
#
# Runner strings may contain {version}, which is resolved at registry load time.
# Fill in HASH_PLACEHOLDERs below with the actual biocontainers build hash so
# that docker/singularity runners are usable out of the box.
#
# Conda runner format:  channel::package={version}
# Docker runner format: registry/image:{version}--HASH
# Singularity format:   https://depot.galaxyproject.org/singularity/image:{version}--HASH

# -----------------------------------------------------------------------
# Core tools — present in the standard anvi'o conda environment
# -----------------------------------------------------------------------

blast:
  authors: Camacho et al.
  citation: doi:10.1186/1471-2105-10-421
  url: https://blast.ncbi.nlm.nih.gov/Blast.cgi
  version: 2.16.0
  runners:
    conda: bioconda::blast={version}
    docker: quay.io/biocontainers/blast:{version}--HASH_PLACEHOLDER
    singularity: https://depot.galaxyproject.org/singularity/blast:{version}--HASH_PLACEHOLDER

